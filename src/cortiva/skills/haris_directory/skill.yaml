# haris_directory — Innovology's people & agent directory (HARIS)
#
# HARIS (Human-Agent-Resource-Information-System, haris.innovology.io) is the
# org's OWN identity hub — the system of record for every person and AI agent.
# It is SEPARATE from the Cortiva platform: identity lives in HARIS, runtime
# lives in Cortiva.
#
# Not an MCP server. HARIS is a plain REST API, and each agent carries its OWN
# x-api-key (delivered by the HQ `haris` connector as HARIS_API_KEY /
# HARIS_BASE_URL). The agent does the work on its node — either by importing
# the bundled `client.py` (HarisClient) or by calling the REST API directly.
# This skill teaches the agent the contract; the connector delivers the key.

name: haris_directory
description: >
  Read and maintain Innovology's people & AI-agent directory (HARIS). List who
  exists in the org, provision new agent records, and create or update people.
  Every call uses the agent's own HARIS key, so RBAC applies per-identity — a
  viewer can list, only manager+/hr can write.
category: identity
version: "0.1.0"
author: innovology

# Tools the skill exposes to the agent (advertised; matches the HQ connector).
tools_allowed:
  - haris_list_directory
  - haris_provision_agent
  - haris_upsert_human

# Runtime hook — local Python module, not an MCP server. The implementation is
# the bundled HarisClient; the agent calls it on its node (the work happens
# locally against the REST API, attributable to the agent's own key).
runtime:
  kind: local_python
  module: cortiva.skills.haris_directory.client
  entrypoint: HarisClient

# Preflight: the connector must have delivered the agent's key + origin.
requires:
  env: [HARIS_API_KEY, HARIS_BASE_URL]

tags:
  - identity
  - directory
  - hr
  - haris

# Procedures appended to the agent's procedures.md when this skill is installed.
procedures_file: procedures.md
skills_text_file: skills_text.md
