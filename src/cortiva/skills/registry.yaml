# Cortiva Skill Registry
#
# Each skill wraps an MCP server or provides standalone procedures.
# Install with: cortiva skill install <name>
#
# Categories:
#   project-management, code-quality, version-control, databases,
#   cloud-infrastructure, monitoring, communication, documentation,
#   browser-automation, file-management, data-processing, ai-ml,
#   security, devops, design, productivity, finance, marketing,
#   search, storage, email, calendar, crm, analytics, testing,
#   api-integration, blockchain, iot, media, language, ecommerce

skills:

  # ===================================================================
  # PROJECT MANAGEMENT
  # ===================================================================

  - name: linear
    description: Create, update, search, and manage Linear issues and projects
    category: project-management
    tags: [issues, tickets, agile, sprint]
    mcp:
      package: "@linear/mcp-server"
      command: "npx @linear/mcp-server"
      env: [LINEAR_API_KEY]
    procedures: |
      ## Linear Integration
      - Use Linear tools to create issues, update status, and search tickets.
      - When creating issues, always assign to a team and set priority.
      - Link related issues using relations.
      - Use labels for categorisation (bug, feature, improvement).

  - name: jira
    description: Manage Jira issues, sprints, and boards
    category: project-management
    tags: [issues, tickets, agile, atlassian]
    mcp:
      package: "@anthropic/mcp-server-jira"
      command: "npx @anthropic/mcp-server-jira"
      env: [JIRA_URL, JIRA_EMAIL, JIRA_API_TOKEN]
    procedures: |
      ## Jira Integration
      - Create and update Jira issues with appropriate fields.
      - Always set issue type, priority, and assignee.
      - Use JQL for complex searches.

