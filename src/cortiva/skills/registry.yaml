      package: "mcp-server-sonarqube"
      command: "npx mcp-server-sonarqube"
      env: [SONAR_TOKEN, SONAR_URL]

  - name: pytest-runner
    description: Run Python tests with pytest and report results
    category: testing
    tags: [python, testing, pytest]
    procedures: |
      ## Running Tests
      - Run tests with: pytest --tb=short -q
      - For specific files: pytest tests/test_module.py -v
      - For coverage: pytest --cov=src --cov-report=term-missing
      - Fix failing tests before committing.
      - Write tests for all new functionality.

  - name: jest-runner
    description: Run JavaScript tests with Jest
    category: testing
    tags: [javascript, testing, jest]
    procedures: |
      ## Running Tests
      - Run tests with: npx jest
      - For specific files: npx jest path/to/test
      - For coverage: npx jest --coverage
      - Watch mode: npx jest --watch

