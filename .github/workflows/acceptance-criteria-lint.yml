name: Acceptance Criteria Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  ac-check:
    name: Verify Acceptance Criteria
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Acceptance Criteria check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/scripts/check-acceptance-criteria.sh
          .github/scripts/check-acceptance-criteria.sh
